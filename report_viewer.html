<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulnerability Report Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .controls {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .control-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .file-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .file-input-group label {
            font-weight: 600;
            color: #333;
        }
        
        .file-input-group input[type="file"] {
            padding: 8px;
            border: 2px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
            flex: 1;
            min-width: 200px;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .reports-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            flex-wrap: wrap;
        }
        
        .report-tab {
            background: white;
            border: 2px solid #ddd;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .report-tab:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .report-tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .report-tab button {
            background: none;
            border: none;
            margin-left: 10px;
            cursor: pointer;
            color: inherit;
            font-size: 1.1em;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 4px solid #667eea;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
        }
        
        .vulnerabilities-list {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .vuln-item {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .vuln-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #667eea;
        }
        
        .vuln-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .vuln-type {
            font-weight: bold;
            font-size: 1.1em;
            color: #333;
        }
        
        .vuln-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .badge-type {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .badge-access {
            background: #f3e5f5;
            color: #7b1fa2;
        }
        
        .vuln-body {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .vuln-field {
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
            border-left: 3px solid #667eea;
        }
        
        .vuln-field-label {
            font-weight: 600;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .vuln-field-value {
            font-family: 'Courier New', monospace;
            color: #333;
            word-break: break-all;
            font-size: 0.95em;
        }
        
        .timestamp {
            font-size: 0.85em;
            color: #999;
        }
        
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #1976d2;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #1565c0;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state h2 {
            margin-bottom: 10px;
            color: #666;
        }
        
        .error-box {
            background: #ffebee;
            border-left: 4px solid #d32f2f;
            padding: 15px;
            border-radius: 5px;
            color: #c62828;
            margin-bottom: 20px;
        }
        
        .filter-section {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
        }
        
        .filter-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        .breakdown-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .breakdown-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        
        .breakdown-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        .breakdown-item {
            padding: 8px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
        
        .breakdown-item:last-child {
            border-bottom: none;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .control-group {
                flex-direction: column;
            }
            
            .file-input-group {
                flex-direction: column;
            }
            
            .vuln-body {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Vulnerability Report Viewer</h1>
            <p>Analyze and view kernel driver vulnerability analysis reports</p>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <div class="file-input-group">
                    <label for="singleFile">Load Single Report:</label>
                    <input type="file" id="singleFile" accept=".json">
                </div>
                <button class="btn" onclick="loadSingleFile()">Load Report</button>
            </div>
            <div class="control-group" style="margin-top: 15px; border-top: 1px solid #ddd; padding-top: 15px;">
                <div class="file-input-group">
                    <label for="dirInput">Load Reports from Directory:</label>
                    <input type="file" id="dirInput" webkitdirectory directory multiple accept=".json">
                </div>
                <button class="btn" onclick="loadDirectory()">Load Directory</button>
            </div>
            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #ddd;">
                <button class="btn btn-secondary" onclick="clearAllReports()">Clear All Reports</button>
            </div>
        </div>
        
        <div id="tabsContainer" class="reports-tabs"></div>
        
        <div id="errorBox"></div>
        
        <div id="statsContainer"></div>
        
        <div id="filterSection"></div>
        
        <div id="vulnerabilitiesContainer"></div>
    </div>
    
    <script>
        let allReports = {};
        let currentReport = null;
        let filteredVulnerabilities = [];
        
        function loadSingleFile() {
            const input = document.getElementById('singleFile');
            if (!input.files.length) {
                showError('Please select a file first');
                return;
            }
            
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    const fileName = file.name;
                    allReports[fileName] = data;
                    addReportTab(fileName);
                    selectReport(fileName);
                    clearError();
                } catch (error) {
                    showError(`Error parsing JSON: ${error.message}`);
                }
            };
            reader.readAsText(file);
        }
        
        function loadDirectory() {
            const input = document.getElementById('dirInput');
            const files = Array.from(input.files).filter(f => f.name.endsWith('.json'));
            
            if (!files.length) {
                showError('No JSON files found in selected directory');
                return;
            }
            
            let loadedCount = 0;
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        const fileName = file.name;
                        allReports[fileName] = data;
                        addReportTab(fileName);
                        loadedCount++;
                        
                        if (loadedCount === files.length) {
                            const firstFile = Object.keys(allReports)[0];
                            selectReport(firstFile);
                            clearError();
                        }
                    } catch (error) {
                        console.error(`Error parsing ${file.name}:`, error);
                    }
                };
                reader.readAsText(file);
            });
        }
        
        function addReportTab(fileName) {
            const tabsContainer = document.getElementById('tabsContainer');
            
            // Check if tab already exists
            if (document.getElementById(`tab-${fileName}`)) {
                return;
            }
            
            const tab = document.createElement('div');
            tab.id = `tab-${fileName}`;
            tab.className = 'report-tab';
            tab.innerHTML = `
                <span onclick="selectReport('${fileName}')">${fileName}</span>
                <button onclick="removeReport('${fileName}')" title="Remove this report">×</button>
            `;
            tabsContainer.appendChild(tab);
        }
        
        function selectReport(fileName) {
            // Update active tab
            document.querySelectorAll('.report-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            const activeTab = document.getElementById(`tab-${fileName}`);
            if (activeTab) {
                activeTab.classList.add('active');
            }
            
            currentReport = fileName;
            const data = allReports[fileName];
            filteredVulnerabilities = [...data.vulnerabilities];
            displayReport(data);
        }
        
        function removeReport(fileName) {
            delete allReports[fileName];
            const tab = document.getElementById(`tab-${fileName}`);
            if (tab) {
                tab.remove();
            }
            
            if (currentReport === fileName) {
                const remaining = Object.keys(allReports);
                if (remaining.length > 0) {
                    selectReport(remaining[0]);
                } else {
                    clearDisplay();
                }
            }
        }
        
        function clearAllReports() {
            if (Object.keys(allReports).length === 0) {
                showError('No reports loaded');
                return;
            }
            allReports = {};
            currentReport = null;
            document.getElementById('tabsContainer').innerHTML = '';
            clearDisplay();
        }
        
        function displayReport(data) {
            displayStats(data);
            displayFilters(data);
            displayVulnerabilities(data);
        }
        
        function displayStats(data) {
            const statsContainer = document.getElementById('statsContainer');
            const vulnsByType = {};
            const vulnsByAccess = {};
            
            data.vulnerabilities.forEach(vuln => {
                vulnsByType[vuln.vulnerability_type] = (vulnsByType[vuln.vulnerability_type] || 0) + 1;
                vulnsByAccess[vuln.access_type] = (vulnsByAccess[vuln.access_type] || 0) + 1;
            });
            
            let html = `
                <div class="info-box">
                    Driver: <strong>${data.driver_name}</strong> | Generated: <strong>${new Date(data.generated_at).toLocaleString()}</strong>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total Vulnerabilities</div>
                        <div class="stat-value">${data.total_vulnerabilities}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Unique Vulnerability Types</div>
                        <div class="stat-value">${Object.keys(vulnsByType).length}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Unique Access Types</div>
                        <div class="stat-value">${Object.keys(vulnsByAccess).length}</div>
                    </div>
                </div>
                
                <div class="breakdown-grid">
                    <div class="breakdown-card">
                        <div class="breakdown-title">By Vulnerability Type</div>
                        ${Object.entries(vulnsByType).map(([type, count]) => 
                            `<div class="breakdown-item"><span>${type}</span><span style="font-weight: bold;">${count}</span></div>`
                        ).join('')}
                    </div>
                    <div class="breakdown-card">
                        <div class="breakdown-title">By Access Type</div>
                        ${Object.entries(vulnsByAccess).map(([type, count]) => 
                            `<div class="breakdown-item"><span>${type}</span><span style="font-weight: bold;">${count}</span></div>`
                        ).join('')}
                    </div>
                </div>
            `;
            
            statsContainer.innerHTML = html;
        }
        
        function displayFilters(data) {
            const filterSection = document.getElementById('filterSection');
            
            const vulnTypes = [...new Set(data.vulnerabilities.map(v => v.vulnerability_type))];
            const accessTypes = [...new Set(data.vulnerabilities.map(v => v.access_type))];
            
            let html = `
                <div class="filter-section">
                    <label style="font-weight: 600;">Filters:</label>
                    <input type="text" class="filter-input" id="searchInput" placeholder="Search by IOCTL, RIP, or type..." 
                           onkeyup="applyFilters()" style="flex: 1; min-width: 200px;">
                    <select class="filter-input" id="vulnTypeFilter" onchange="applyFilters()">
                        <option value="">All Vulnerability Types</option>
                        ${vulnTypes.map(type => `<option value="${type}">${type}</option>`).join('')}
                    </select>
                    <select class="filter-input" id="accessTypeFilter" onchange="applyFilters()">
                        <option value="">All Access Types</option>
                        ${accessTypes.map(type => `<option value="${type}">${type}</option>`).join('')}
                    </select>
                </div>
            `;
            
            filterSection.innerHTML = html;
        }
        
        function applyFilters() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const vulnTypeFilter = document.getElementById('vulnTypeFilter').value;
            const accessTypeFilter = document.getElementById('accessTypeFilter').value;
            
            const data = allReports[currentReport];
            filteredVulnerabilities = data.vulnerabilities.filter(vuln => {
                const matchesSearch = !searchText || 
                    vuln.ioctl.toLowerCase().includes(searchText) ||
                    vuln.rip.toLowerCase().includes(searchText) ||
                    vuln.vulnerability_type.toLowerCase().includes(searchText) ||
                    vuln.access_type.toLowerCase().includes(searchText);
                
                const matchesVulnType = !vulnTypeFilter || vuln.vulnerability_type === vulnTypeFilter;
                const matchesAccessType = !accessTypeFilter || vuln.access_type === accessTypeFilter;
                
                return matchesSearch && matchesVulnType && matchesAccessType;
            });
            
            displayVulnerabilities(data);
        }
        
        function displayVulnerabilities(data) {
            const container = document.getElementById('vulnerabilitiesContainer');
            
            if (filteredVulnerabilities.length === 0) {
                container.innerHTML = '<div class="empty-state"><h2>No vulnerabilities found</h2><p>Try adjusting your filters</p></div>';
                return;
            }
            
            let html = `<div class="vulnerabilities-list">
                <h2 style="margin-bottom: 20px; color: #333;">Vulnerabilities (${filteredVulnerabilities.length})</h2>
            `;
            
            filteredVulnerabilities.forEach((vuln, index) => {
                html += `
                    <div class="vuln-item">
                        <div class="vuln-header">
                            <span class="vuln-type">#${index + 1}</span>
                            <span class="vuln-badge badge-type">${vuln.vulnerability_type}</span>
                            <span class="vuln-badge badge-access">${vuln.access_type}</span>
                        </div>
                        <div class="vuln-body">
                            <div class="vuln-field">
                                <div class="vuln-field-label">IOCTL</div>
                                <div class="vuln-field-value">${vuln.ioctl}</div>
                            </div>
                            <div class="vuln-field">
                                <div class="vuln-field-label">RIP (Instruction Pointer)</div>
                                <div class="vuln-field-value">${vuln.rip}</div>
                            </div>
                            ${Object.entries(vuln.address_info).map(([key, value]) => 
                                `<div class="vuln-field">
                                    <div class="vuln-field-label">${key}</div>
                                    <div class="vuln-field-value">${value}</div>
                                </div>`
                            ).join('')}
                        </div>
                        ${Object.keys(vuln.additional_info).length > 0 ? `
                            <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee;">
                                <details style="cursor: pointer;">
                                    <summary style="font-weight: 600; color: #666;">Additional Information</summary>
                                    <pre style="margin-top: 10px; padding: 10px; background: #f9f9f9; border-radius: 5px; overflow-x: auto; font-size: 0.9em;">${JSON.stringify(vuln.additional_info, null, 2)}</pre>
                                </details>
                            </div>
                        ` : ''}
                        <div class="timestamp" style="margin-top: 10px;">
                            Found: ${new Date(vuln.timestamp).toLocaleString()}
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        function clearDisplay() {
            document.getElementById('statsContainer').innerHTML = '';
            document.getElementById('filterSection').innerHTML = '';
            document.getElementById('vulnerabilitiesContainer').innerHTML = 
                '<div class="empty-state"><h2>No reports loaded</h2><p>Load a JSON report or a directory of reports to get started</p></div>';
        }
        
        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.innerHTML = `<div class="error-box">${message}</div>`;
        }
        
        function clearError() {
            document.getElementById('errorBox').innerHTML = '';
        }
        
        // Initialize
        clearDisplay();
    </script>
</body>
</html>
